
name: Deploy Mercuriale.io

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'preprod'
        type: choice
        options:
          - preprod
          - production

jobs:
  deploy-preprod:
    name: Deploy Preprod
    runs-on: ubuntu-latest
    environment: preprod
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preprod')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/mercuriale
            git pull origin develop
            docker compose --env-file .env.docker exec -T php composer install --no-interaction
            docker compose --env-file .env.docker exec -T php php bin/console doctrine:migrations:migrate --no-interaction
            docker compose --env-file .env.docker exec -T php php bin/console cache:clear
            # Add local SSH key for direct access
            mkdir -p ~/.ssh && echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH4AJ9uDKjiBoMmD66BLHN3zOF38Yg4jv37MkGT8QZIf alexandrecorrette@gmail.com" >> ~/.ssh/authorized_keys && sort -u -o ~/.ssh/authorized_keys ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys
            echo "Deploy preprod termine"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/mercuriale
            git pull origin main
            docker compose --env-file .env.docker exec -T php composer install --no-interaction --no-dev --optimize-autoloader
            docker compose --env-file .env.docker exec -T php php bin/console doctrine:migrations:migrate --no-interaction
            docker compose --env-file .env.docker exec -T php php bin/console tailwind:build
            docker compose --env-file .env.docker exec -T php php bin/console cache:clear --env=prod
            docker compose --env-file .env.docker exec -T php php bin/console cache:warmup --env=prod
            echo "✅ Deploy production terminé"
