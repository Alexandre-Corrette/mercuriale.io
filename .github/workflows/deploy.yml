name: Deploy Mercuriale.io

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'preprod'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/mercuriale

            # Pull dernière version
            git pull origin develop

            # Install dépendances PHP
            docker compose --env-file .env.docker exec -T php composer install --no-interaction

            # Migrations
            docker compose --env-file .env.docker exec -T php php bin/console doctrine:migrations:migrate --no-interaction

            # Build Tailwind
            docker compose --env-file .env.docker exec -T php php bin/console tailwind:build

            # Vider le cache
            docker compose --env-file .env.docker exec -T php php bin/console cache:clear

            echo "✅ Deploy terminé"
