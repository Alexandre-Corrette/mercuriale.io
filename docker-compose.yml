services:

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mercuriale_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      - database
      - redis
    networks:
      - mercuriale
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mercuriale_worker
    restart: unless-stopped
    command: php bin/console messenger:consume async --time-limit=3600 -vv
    volumes:
      - .:/var/www/html
    depends_on:
      - database
      - redis
    networks:
      - mercuriale
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages

  nginx:
    image: nginx:alpine
    container_name: mercuriale_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php
    networks:
      - mercuriale

  database:
    image: postgres:16-alpine
    container_name: mercuriale_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - mercuriale

  redis:
    image: redis:7-alpine
    container_name: mercuriale_redis
    restart: unless-stopped
    networks:
      - mercuriale

  mailpit:
    image: axllent/mailpit
    container_name: mercuriale_mailpit
    restart: unless-stopped
    expose:
      - "8025"
      - "1025"
    networks:
      - mercuriale

networks:
  mercuriale:
    driver: bridge

volumes:
  database_data:
